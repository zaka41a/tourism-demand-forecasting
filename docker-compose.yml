version: '3.8'

services:
  # Main application - Streamlit Dashboard
  dashboard:
    build: .
    container_name: tourism-forecast-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Jupyter Notebook (optional)
  jupyter:
    build: .
    container_name: tourism-forecast-jupyter
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

networks:
  default:
    name: tourism-forecast-network
